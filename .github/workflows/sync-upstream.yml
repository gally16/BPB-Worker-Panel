# 工作流的名称
name: Sync Upstream Fork

# 触发工作流的事件
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# 定义作业
jobs:
  sync:
    # 作业运行的环境
    runs-on: ubuntu-latest

    # 为此作业授予权限
    # 确保这里的 permissions 和 runs-on, steps 的缩进级别完全相同
    permissions:
      contents: write
      workflows: write

    # 作业的步骤
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with Upstream
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git remote add upstream https://github.com/bia-pain-bache/BPB-Worker-Panel.git || true
          
          git fetch upstream
          
          git checkout main
          
          git rebase upstream/main
          
          git push origin main --force
